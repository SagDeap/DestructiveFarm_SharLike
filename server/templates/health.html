{% extends "_base.html" %}

{% block page_title %}Состояние{% endblock %}

{% block content %}
<div id="health-live"
     hx-get="/ui/health_partial"
     hx-trigger="load, every 2s"
     hx-swap="innerHTML">
    <span class="text-muted">Загрузка…</span>
</div>
{% endblock %}

{% block scripts %}
<script>
    setInterval(function () {
        var data = document.getElementById('health-data');
        if (!data) return;
        var lastTick = parseFloat(data.dataset.lastTick) || 0;
        var period = parseFloat(data.dataset.period) || 5;
        if (lastTick <= 0) return;

        var now = Date.now() / 1000;
        var elapsed = Math.max(0, now - lastTick);
        var remaining = Math.max(0, period - elapsed);

        var cd = document.getElementById('stat-countdown');
        if (cd) cd.textContent = remaining.toFixed(1) + 's';
        var tk = document.getElementById('stat-tick-age');
        if (tk) tk.textContent = elapsed.toFixed(1) + 's';
    }, 100);
</script>
{% endblock %}
