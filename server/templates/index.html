{% extends "_base.html" %}

{% block page_title %}Флаги{% endblock %}

{% block content %}
    <div class="row mb-3">
        <div class="col-12">
            <div class="card panel-card sparkline-card"
                 hx-get="/ui/sparkline_partial"
                 hx-trigger="load, every 30s"
                 hx-swap="innerHTML">
                <div class="card-body">
                    <span class="text-muted">Загрузка accept-rate…</span>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-lg-8 mb-3">
            <div class="card panel-card">
                <div class="card-body">
                    <h4 class="card-title">Просмотр флагов</h4>
                    <form id="show-flags-form"
                          hx-post="/ui/flags_partial"
                          hx-target="#flags-results"
                          hx-swap="innerHTML"
                          hx-trigger="submit"
                          onsubmit="document.getElementById('page-number').value = 1;">
                        <div class="row mb-2">
                            <div class="col-md-4">
                                <label for="sploit-select">Сплойт</label>
                                <select class="form-control form-control-sm" id="sploit-select" name="sploit">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['sploit'] %}
                                    <option>{{ item }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="team-select">Команда</label>
                                <select class="form-control form-control-sm" id="team-select" name="team">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['team'] %}
                                    <option>{{ item }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="flag-input">
                                    Флаг
                                    <small class="text-muted ml-2">подстрока, без учета регистра</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="flag-input" name="flag">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label for="time-since-input">
                                    С
                                    <small class="text-muted ml-2">{{ server_tz_name }}</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="time-since-input"
                                       name="time-since"
                                       placeholder="yyyy-mm-dd hh:mm">
                            </div>
                            <div class="col-md-3">
                                <label for="time-until-input">
                                    По
                                    <small class="text-muted ml-2">{{ server_tz_name }}</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="time-until-input"
                                       name="time-until"
                                       placeholder="yyyy-mm-dd hh:mm">
                            </div>
                            <div class="col-md-2">
                                <label for="status-select">Статус</label>
                                <select class="form-control form-control-sm" id="status-select" name="status">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['status'] %}
                                    <option value="{{ item }}">{{ item|status_label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="checksystem-response-input">Ответ чекера</label>
                                <input type="text" class="form-control form-control-sm" id="checksystem-response-input"
                                       name="checksystem_response">
                            </div>
                        </div>
                        <div class="row align-items-center">
                            <div class="col-auto">
                                <button type="submit" class="btn btn-primary btn-sm submit-btn">Показать</button>
                            </div>
                            <div class="col d-flex align-items-center" x-data="{ live: true }">
                                <label class="live-toggle mb-0">
                                    <input type="checkbox" x-model="live"
                                           @change="window.setFlagsLive($event.target.checked)">
                                    <span>Автообновление каждые 3s</span>
                                </label>
                                <span class="pulse-dot ml-2" :class="{ 'pulse-active': live }"></span>
                            </div>
                        </div>
                        <input type="hidden" value="1" id="page-number" name="page-number">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4 mb-3">
            <div class="card panel-card">
                <div class="card-body">
                    <h4 class="card-title">Добавить флаги вручную</h4>
                    <form id="post-flags-manual-form"
                          hx-post="/ui/post_flags_manual"
                          hx-swap="none"
                          hx-on::after-request="if(event.detail.successful) this.reset();">
                        <label for="text-with-flags">
                            Текст с флагами
                            <small class="text-muted ml-2">формат: {{ flag_format }}</small>
                        </label>
                        <textarea class="form-control form-control-sm mb-3" id="text-with-flags" name="text"></textarea>
                        <button type="submit" class="btn btn-primary btn-sm">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="flags-results"
         hx-post="/ui/flags_partial"
         hx-trigger="load, every 3s [window.flagsLive], refreshFlags from:body"
         hx-include="#show-flags-form"
         hx-swap="innerHTML">
        <div class="text-muted">Загрузка флагов…</div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    window.flagsLive = true;
    window.setFlagsLive = function (on) { window.flagsLive = !!on; };
    window.setFlagsPage = function (page) {
        document.getElementById('page-number').value = page;
        htmx.trigger('#flags-results', 'refreshFlags');
    };
</script>
{% endblock %}
