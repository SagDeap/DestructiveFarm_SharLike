<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="/static/favicon.png">

    <title>SharLike Farm 1.0 - Флаги</title>

    <link href="/static/css/bootswatch-flatly.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-0">
    <img class="logo" src="/static/img/dvteam_white.png">
    <div class="navbar-brand">SharLike Farm 1.0</div>
    <div class="navbar-nav ml-auto">
        <a class="nav-item nav-link active" href="/">Флаги</a>
        <a class="nav-item nav-link" href="/stats">Статистика</a>
        <a class="nav-item nav-link" href="/health">Состояние</a>
        <a class="nav-item nav-link" href="/config">Конфиг</a>
        <a class="nav-item nav-link" href="/maintenance">Обслуживание</a>
    </div>
</nav>

<div class="container-fluid page-shell">
    <div class="row mb-4">
        <div class="col-lg-8">
            <div class="card panel-card">
                <div class="card-body">
                    <h4 class="card-title">Просмотр флагов</h4>
                    <form id="show-flags-form">
                        <div class="row mb-2">
                            <div class="col-md-4">
                                <label for="sploit-select">Сплойт</label>
                                <select class="form-control form-control-sm" id="sploit-select" name="sploit">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['sploit'] %}
                                    <option>{{ item }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="team-select">Команда</label>
                                <select class="form-control form-control-sm" id="team-select" name="team">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['team'] %}
                                    <option>{{ item }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="flag-input">
                                    Флаг
                                    <small class="text-muted ml-2">подстрока, без учета регистра</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="flag-input" name="flag">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label for="time-since-input">
                                    С
                                    <small class="text-muted ml-2">{{ server_tz_name }}</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="time-since-input"
                                       name="time-since"
                                       placeholder="yyyy-mm-dd hh:mm">
                            </div>
                            <div class="col-md-3">
                                <label for="time-until-input">
                                    По
                                    <small class="text-muted ml-2">{{ server_tz_name }}</small>
                                </label>
                                <input type="text" class="form-control form-control-sm" id="time-until-input"
                                       name="time-until"
                                       placeholder="yyyy-mm-dd hh:mm">
                            </div>
                            <div class="col-md-2">
                                <label for="status-select">Статус</label>
                                <select class="form-control form-control-sm" id="status-select" name="status">
                                    <option value="">Все</option>
                                    {% for item in distinct_values['status'] %}
                                    <option value="{{ item }}">{{ item|status_label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="checksystem-response-input">
                                    Ответ чекера
                                </label>
                                <input type="text" class="form-control form-control-sm" id="checksystem-response-input"
                                       name="checksystem_response">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary btn-sm submit-btn">Показать</button>
                            </div>
                        </div>
                        <input type="hidden" value="1" id="page-number" name="page-number">
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card panel-card">
                <div class="card-body">
                    <h4 class="card-title">Добавить флаги вручную</h4>
                    <form id="post-flags-manual-form">
                        <label for="text-with-flags">
                            Текст с флагами
                            <small class="text-muted ml-2">формат: {{ flag_format }}</small>
                        </label>
                        <textarea class="form-control form-control-sm mb-3" id="text-with-flags" name="text"></textarea>
                        <button type="submit" class="btn btn-primary btn-sm">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-3 text-center query-status"></div>

    <div class="search-results card panel-card" style="display: none;">
        <div class="card-body">
        <p class="result-count">Найдено флагов: <span class="total-count"></span></p>

        <ul class="pagination pagination-sm"></ul>

        <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th scope="col">Сплойт</th>
                <th scope="col">Команда</th>
                <th scope="col">Флаг</th>
                <th scope="col">Время</th>
                <th scope="col">Статус</th>
                <th scope="col">Ответ чекера</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
        </div>

        <ul class="pagination pagination-sm"></ul>
        </div>
    </div>
</div>

<script src="/static/js/jquery.min.js"></script>
<script src="/static/js/ui.js"></script>

</body>
</html>
